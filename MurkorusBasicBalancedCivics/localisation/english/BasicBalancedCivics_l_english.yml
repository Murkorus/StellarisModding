 murkbbc_civic_specialisation_incentives:0 "Specialisation Incentives"
 murkbbc_civic_specialisation_incentives_desc:0 "By giving slaves more rights and increased access to amenities, they are incentivised to work harder. By making education and mentorship mandatory, slaves are given the skills necessary to chase these incentives."
 murkbbc_specialisation_incentives_effects:0 "Allows $murkbbc_slavery_mandated_expertise$ slavery type, under which slaves have increased amenity usage, and increased work efficiency\nUnlocks Specialisation Directive policies, allowing further specialisation of specialist slaves"
 murkbbc_slavery_mandated_expertise:0 "Mandated Expertise"
 murkbbc_slavery_mandated_expertise_tooltip:0 "Mandated Expertise forcefully trains slaves in various forms of crafts, from science, to smithing, to entertaining. This inevitably blurs the line between citizen and slave, putting this kind of forced labour in a grey area. Labour is not so much forced as it is incentivised through conditioning the workers into a lifelong wage-chase."
